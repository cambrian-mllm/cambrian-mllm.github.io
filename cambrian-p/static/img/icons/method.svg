<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Token sequence (top row) with highlighted camera token -->
  <circle cx="12" cy="12" r="2.5" stroke="#FBBC04"/>
  <circle cx="22" cy="12" r="2.5" stroke="#FBBC04"/>
  <circle cx="32" cy="12" r="3" fill="#FBBC04" stroke="#FBBC04"/>
  <circle cx="42" cy="12" r="2.5" stroke="#FBBC04"/>
  <circle cx="52" cy="12" r="2.5" stroke="#FBBC04"/>
  <!-- Arrow from camera token into frame -->
  <line x1="32" y1="15" x2="32" y2="22" stroke="#FBBC04"/>
  <polyline points="29,20 32,23 35,20" stroke="#FBBC04"/>
  <!-- Frame (per-frame) -->
  <rect x="10" y="26" width="44" height="30" rx="3" stroke="#FBBC04"/>
  <!-- 3D pose axes inside the frame -->
  <circle cx="32" cy="42" r="2" fill="#2d3748" stroke="none"/>
  <line x1="32" y1="42" x2="32" y2="32" stroke="#2ecc71"/>
  <line x1="32" y1="42" x2="46" y2="42" stroke="#e74c3c"/>
  <line x1="32" y1="42" x2="24" y2="52" stroke="#2563EB"/>
</svg>
